<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MisLocales</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#eef0f8;font-family:sans-serif;min-height:100vh}
header{background:#1a1d27;padding:16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.07)}
.logo{font-weight:800;font-size:1.3rem;color:#f5a623}
.logo span{color:#eef0f8}
.hbtns{display:flex;gap:8px;align-items:center}
.btn-add{background:#f5a623;color:#111;border:none;font-weight:700;font-size:.82rem;padding:9px 16px;border-radius:50px;cursor:pointer}
.tabs{display:flex;background:#1a1d27;border-bottom:1px solid rgba(255,255,255,.07);overflow-x:auto}
.tab{font-weight:600;font-size:.78rem;padding:14px 16px;color:#7a7f9a;border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent}
.tab.active{color:#f5a623;border-bottom-color:#f5a623}
.main{padding:18px 16px 80px;max-width:600px;margin:0 auto}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.card{background:#1a1d27;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:16px}
.card .lbl{font-size:.7rem;color:#7a7f9a;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.card .val{font-weight:800;font-size:1.5rem}
.val.green{color:#3ddc97}.val.red{color:#ff4f6d}.val.yellow{color:#f5a623}
.sec{font-weight:700;font-size:.85rem;color:#7a7f9a;text-transform:uppercase;letter-spacing:1px;margin:16px 0 10px}
.lcard{background:#1a1d27;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;position:relative;overflow:hidden}
.lcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.lcard.al-dia::before{background:#3ddc97}
.lcard.vencido::before{background:#ff4f6d}
.lcard.sin-arr::before{background:#7a7f9a}
.lcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.lcard-nom{font-weight:700;font-size:1rem}
.lcard-sub{font-size:.72rem;color:#7a7f9a;margin-top:2px}
.badge{font-size:.65rem;font-weight:600;padding:4px 10px;border-radius:50px}
.badge.pagado{background:rgba(61,220,151,.15);color:#3ddc97}
.badge.pendiente{background:rgba(255,79,109,.15);color:#ff4f6d}
.badge.libre{background:rgba(122,127,154,.15);color:#7a7f9a}
.lcard-info{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lbl2{font-size:.67rem;color:#7a7f9a}
.val2{font-size:.85rem;font-weight:500}
.empty{text-align:center;padding:48px 20px;color:#7a7f9a;font-size:.9rem}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#1a1d27;width:100%;max-width:600px;border-radius:24px 24px 0 0;padding:24px 20px 36px;max-height:90vh;overflow-y:auto}
.mhandle{width:36px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:0 auto 20px}
.mtitle{font-weight:800;font-size:1.2rem;margin-bottom:20px}
.fgrp{margin-bottom:14px}
.fgrp label{font-size:.73rem;color:#7a7f9a;text-transform:uppercase;display:block;margin-bottom:6px}
.fgrp input,.fgrp select{width:100%;background:#22263a;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:11px 14px;color:#eef0f8;font-size:.9rem;outline:none}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-pri{width:100%;background:#f5a623;color:#111;border:none;font-weight:700;font-size:.95rem;padding:14px;border-radius:12px;cursor:pointer;margin-top:8px}
.btn-sec{width:100%;background:transparent;color:#7a7f9a;border:1px solid rgba(255,255,255,.07);font-weight:600;font-size:.9rem;padding:13px;border-radius:12px;cursor:pointer;margin-top:8px}
.dbtns{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.dbtn{flex:1;padding:10px;border-radius:10px;font-weight:600;font-size:.76rem;border:none;cursor:pointer;white-space:nowrap}
.dbtn.pago{background:#3ddc97;color:#111}
.dbtn.wa{background:#25D366;color:#111}
.dbtn.edit{background:#22263a;color:#eef0f8;border:1px solid rgba(255,255,255,.07)}
.dbtn.del{background:rgba(255,79,109,.15);color:#ff4f6d}
.pitem{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.pitem:last-child{border-bottom:none}
.pmonto{font-weight:700;color:#3ddc97}
.pdel{background:none;border:none;color:#ff4f6d;font-size:1rem;cursor:pointer;padding:4px 8px}
.medio-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mbtn{padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.07);background:#22263a;color:#7a7f9a;font-weight:600;font-size:.82rem;cursor:pointer;text-align:center}
.mbtn.ef{background:rgba(245,166,35,.15);border-color:#f5a623;color:#f5a623}
.mbtn.tr{background:rgba(61,220,151,.15);border-color:#3ddc97;color:#3ddc97}
.btn-wa-all{width:100%;background:#25D366;color:#111;border:none;font-weight:700;font-size:.9rem;padding:13px;border-radius:12px;cursor:pointer;margin-bottom:20px}
#confirm-box{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;align-items:center;justify-content:center}
#confirm-box.open{display:flex}
#confirm-inner{background:#1a1d27;border-radius:20px;padding:24px 20px;max-width:320px;width:90%;text-align:center}
#confirm-msg{font-size:.95rem;line-height:1.5;margin-bottom:20px}
#confirm-btns{display:flex;gap:10px}
#confirm-btns button{flex:1;padding:12px;border-radius:10px;font-weight:700;font-size:.85rem;border:none;cursor:pointer}
#confirm-ok{background:#ff4f6d;color:#fff}
#confirm-cancel{background:#22263a;color:#7a7f9a}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1d27;color:#eef0f8;padding:10px 20px;border-radius:50px;font-size:.82rem;z-index:9999;border:1px solid rgba(255,255,255,.1);opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap}
.hbtn{background:transparent;border:1px solid rgba(255,255,255,.15);color:#7a7f9a;border-radius:50px;padding:8px 12px;font-size:.75rem;cursor:pointer}
.hbtn.g{border-color:rgba(61,220,151,.3);color:#3ddc97}
</style>
</head>
<body>

<header>
  <div class="logo">Mis<span>Locales</span></div>
  <div class="hbtns">
    <button class="hbtn" id="btnCargar">☁️</button>
    <button class="hbtn g" id="btnGuardar">💾</button>
    <button class="btn-add" id="btnNuevo">+ Nuevo Local</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" id="t0">📊 Resumen</button>
  <button class="tab" id="t1">🏪 Locales</button>
  <button class="tab" id="t2">🔔 Alertas</button>
</div>

<div class="main">
  <div id="tab0"></div>
  <div id="tab1" style="display:none"></div>
  <div id="tab2" style="display:none"></div>
</div>

<!-- CONFIRM -->
<div id="confirm-box">
  <div id="confirm-inner">
    <div id="confirm-msg"></div>
    <div id="confirm-btns">
      <button id="confirm-cancel">Cancelar</button>
      <button id="confirm-ok">Confirmar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- MODAL LOCAL -->
<div class="overlay" id="mLocal">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle" id="mLocalTit">Nuevo Local</div>
    <div class="fgrp"><label>Nombre del Local</label><input id="fNom" placeholder="Ej: Local 1"></div>
    <div class="fgrp"><label>Arrendatario</label><input id="fArr" placeholder="Nombre completo"></div>
    <div class="frow">
      <div class="fgrp"><label>Teléfono</label><input id="fTel" type="tel" placeholder="3XX XXX XXXX"></div>
      <div class="fgrp"><label>Cédula</label><input id="fCed" placeholder="N° doc"></div>
    </div>
    <div class="frow">
      <div class="fgrp"><label>Canon ($)</label><input id="fCan" type="number" placeholder="0"></div>
      <div class="fgrp"><label>Día de pago</label><input id="fDia" type="number" placeholder="15" min="1" max="31"></div>
    </div>
    <div class="frow">
      <div class="fgrp"><label>Inicio contrato</label><input id="fIni" type="date"></div>
      <div class="fgrp"><label>Fin contrato</label><input id="fFin" type="date"></div>
    </div>
    <div class="fgrp"><label>NICs / Notas</label><input id="fObs" placeholder="NIC: XXXXXXX"></div>
    <input type="hidden" id="fId">
    <button class="btn-pri" id="btnGuardarLocal">Guardar</button>
    <button class="btn-sec" id="btnCancelarLocal">Cancelar</button>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="overlay" id="mDetalle">
  <div class="modal" id="mDetalleContent"></div>
</div>

<!-- MODAL PAGO -->
<div class="overlay" id="mPago">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle">Registrar Pago</div>
    <div class="fgrp"><label>Mes</label><input id="pMes" type="month"></div>
    <div class="fgrp"><label>Monto ($)</label><input id="pMonto" type="number" placeholder="0"></div>
    <div class="fgrp"><label>Medio de pago</label></div>
    <div class="medio-btns">
      <button class="mbtn" id="btnEf">💵 Efectivo</button>
      <button class="mbtn" id="btnTr">🏦 Transferencia</button>
    </div>
    <div class="fgrp" id="grpComp" style="display:none"><label>N° Comprobante</label><input id="pComp" placeholder="123456789"></div>
    <div class="fgrp"><label>Fecha</label><input id="pFecha" type="date"></div>
    <div class="fgrp"><label>Nota (opcional)</label><input id="pNota" placeholder="Observaciones..."></div>
    <input type="hidden" id="pLocalId">
    <button class="btn-pri" id="btnGuardarPago">Registrar Pago</button>
    <button class="btn-sec" id="btnCancelarPago">Cancelar</button>
  </div>
</div>

<script>
var SK = 'mis_locales_v1';
var MEM = null;
var MEDIO = '';
var confirmCb = null;
var tabActual = 0;
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzFduuDipeYwuX687wGFE35Wi6hdBG0rbJzEYuXmfX5jQwNjpjPxMle-3_Qy3ODH2mh/exec';

function getData() {
  try { var r=JSON.parse(localStorage.getItem(SK)); if(r&&r.locales){MEM=r;return r;} } catch(e){}
  if(MEM) return MEM;
  return {locales:[],pagos:[],deudas:[]};
}
function saveData(d) {
  MEM=d;
  try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function mesHoy(){var h=new Date();var m=h.getMonth()+1;return h.getFullYear()+'-'+(m<10?'0':'')+m;}
function fCOP(n){if(!n)return '$0';return '$'+Number(n).toLocaleString('es-CO');}
function fFecha(f){if(!f)return '—';var p=f.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function fMes(ym){if(!ym)return '—';var ms=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];var p=ym.split('-');return ms[parseInt(p[1])-1]+' '+p[0];}

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';},3000);}

function confirm2(msg, ok, cb) {
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-ok').textContent=ok||'Confirmar';
  document.getElementById('confirm-box').className='open';
  confirmCb=cb;
}
document.getElementById('confirm-ok').onclick=function(){document.getElementById('confirm-box').className='';if(confirmCb)confirmCb(true);confirmCb=null;};
document.getElementById('confirm-cancel').onclick=function(){document.getElementById('confirm-box').className='';if(confirmCb)confirmCb(false);confirmCb=null;};

function estadoLocal(l,pagos){
  if(!l.arrendatario) return 'sin-arr';
  if(pagos.some(function(p){return p.localId===l.id&&p.mes===mesHoy();})) return 'al-dia';
  return 'vencido';
}

// TABS
function showTab(n) {
  tabActual=n;
  for(var i=0;i<3;i++){
    document.getElementById('t'+i).className='tab'+(i===n?' active':'');
    document.getElementById('tab'+i).style.display=i===n?'':'none';
  }
  render();
}
document.getElementById('t0').onclick=function(){showTab(0);};
document.getElementById('t1').onclick=function(){showTab(1);};
document.getElementById('t2').onclick=function(){showTab(2);};

function render(){
  if(tabActual===0) renderResumen();
  if(tabActual===1) renderLocales();
  if(tabActual===2) renderAlertas();
}

// RESUMEN
function renderResumen(){
  var d=getData(), mc=mesHoy(), hoy=new Date();
  var conArr=d.locales.filter(function(l){return l.arrendatario;});
  var pagados={};
  d.pagos.forEach(function(p){if(p.mes===mc)pagados[p.localId]=true;});
  var nPag=Object.keys(pagados).length;
  var pendientes=conArr.filter(function(l){return !pagados[l.id];});
  var porCobrar=pendientes.reduce(function(s,l){return s+(Number(l.canon)||0);},0);
  var recibido=d.pagos.filter(function(p){return p.mes===mc;}).reduce(function(s,p){return s+(Number(p.monto)||0);},0);

  var h='<div class="grid2">';
  h+='<div class="card"><div class="lbl">Locales activos</div><div class="val yellow">'+conArr.length+'</div></div>';
  h+='<div class="card"><div class="lbl">Al día</div><div class="val green">'+nPag+'</div></div>';
  h+='<div class="card"><div class="lbl">Por cobrar</div><div class="val red">'+fCOP(porCobrar)+'</div></div>';
  h+='<div class="card"><div class="lbl">Recibido</div><div class="val green">'+fCOP(recibido)+'</div></div>';
  h+='</div>';

  if(pendientes.length>0){
    h+='<button class="btn-wa-all" id="btnWaAll">💬 Cobrar a todos ('+pendientes.length+') — '+fCOP(porCobrar)+'</button>';
  }

  h+='<div class="sec">Pendientes de pago</div>';
  if(pendientes.length===0){
    h+='<div class="empty">🎉 Todos al día este mes!</div>';
  } else {
    pendientes.forEach(function(l){
      h+='<div class="lcard vencido" data-id="'+l.id+'">';
      h+='<div class="lcard-top"><div><div class="lcard-nom">'+l.nombre+'</div><div class="lcard-sub">'+l.arrendatario+'</div></div><span class="badge pendiente">Sin pago</span></div>';
      h+='<div class="lcard-info"><div><div class="lbl2">Canon</div><div class="val2">'+fCOP(l.canon)+'</div></div><div><div class="lbl2">Día pago</div><div class="val2">Día '+(l.diaPago||'—')+'</div></div></div>';
      h+='</div>';
    });
  }

  document.getElementById('tab0').innerHTML=h;

  // eventos
  document.querySelectorAll('#tab0 .lcard').forEach(function(el){
    el.onclick=function(){abrirDetalle(this.getAttribute('data-id'));};
  });
  var bwa=document.getElementById('btnWaAll');
  if(bwa) bwa.onclick=function(){cobrarTodos();};
}

// LOCALES
function renderLocales(){
  var d=getData(), mc=mesHoy();
  var pagados={};
  d.pagos.forEach(function(p){if(p.mes===mc)pagados[p.localId]=true;});
  var h='<div class="sec">'+d.locales.length+' locales registrados</div>';
  if(d.locales.length===0){h='<div class="empty">🏪 Sin locales aún</div>';}
  d.locales.forEach(function(l){
    var est=estadoLocal(l,d.pagos);
    var badge=est==='al-dia'?'<span class="badge pagado">Al día</span>':est==='vencido'?'<span class="badge pendiente">Sin pago</span>':'<span class="badge libre">Disponible</span>';
    h+='<div class="lcard '+est+'" data-id="'+l.id+'">';
    h+='<div class="lcard-top"><div><div class="lcard-nom">'+l.nombre+'</div><div class="lcard-sub">'+(l.arrendatario||'Sin arrendatario')+'</div></div>'+badge+'</div>';
    h+='<div class="lcard-info"><div><div class="lbl2">Canon</div><div class="val2">'+fCOP(l.canon)+'</div></div><div><div class="lbl2">Día pago</div><div class="val2">Día '+(l.diaPago||'—')+'</div></div></div>';
    h+='</div>';
  });
  document.getElementById('tab1').innerHTML=h;
  document.querySelectorAll('#tab1 .lcard').forEach(function(el){
    el.onclick=function(){abrirDetalle(this.getAttribute('data-id'));};
  });
}

// ALERTAS
function renderAlertas(){
  var d=getData(), mc=mesHoy(), hoy=new Date();
  var pagados={};
  d.pagos.forEach(function(p){if(p.mes===mc)pagados[p.localId]=true;});
  var alertas=[];
  d.locales.forEach(function(l){
    if(!l.arrendatario) return;
    if(!pagados[l.id]) alertas.push({icon:'💸',titulo:l.nombre+' — Sin pago este mes',sub:l.arrendatario+' · '+fCOP(l.canon),id:l.id});
    if(l.finContrato){
      var diff=Math.ceil((new Date(l.finContrato)-hoy)/86400000);
      if(diff>=0&&diff<=30) alertas.push({icon:'⚠️',titulo:l.nombre+' — Vence en '+diff+' días',sub:l.arrendatario+' · '+fFecha(l.finContrato),id:l.id});
      if(diff<0) alertas.push({icon:'🔴',titulo:l.nombre+' — Contrato vencido',sub:l.arrendatario+' · '+fFecha(l.finContrato),id:l.id});
    }
  });
  var h='<div class="sec">'+alertas.length+' alertas</div>';
  if(alertas.length===0){h='<div class="empty">✅ Sin alertas</div>';}
  alertas.forEach(function(a){
    h+='<div class="lcard vencido" data-id="'+a.id+'" style="cursor:pointer"><div class="lcard-top"><div style="font-size:1.5rem">'+a.icon+'</div><div><div class="lcard-nom" style="font-size:.9rem">'+a.titulo+'</div><div class="lcard-sub">'+a.sub+'</div></div></div></div>';
  });
  document.getElementById('tab2').innerHTML=h;
  document.querySelectorAll('#tab2 .lcard').forEach(function(el){
    el.onclick=function(){abrirDetalle(this.getAttribute('data-id'));};
  });
}

// DETALLE
function abrirDetalle(id){
  var d=getData(), l=d.locales.find(function(x){return x.id===id;});
  if(!l) return;
  var pagosL=d.pagos.filter(function(p){return p.localId===id;}).sort(function(a,b){return b.mes.localeCompare(a.mes);});
  var h='<div class="mhandle"></div>';
  h+='<div class="mtitle">'+l.nombre+'</div>';
  h+='<div style="color:#7a7f9a;font-size:.85rem;margin-top:-12px;margin-bottom:14px">'+(l.arrendatario||'Sin arrendatario')+'</div>';
  h+='<div class="lcard-info" style="gap:12px">';
  if(l.telefono) h+='<div><div class="lbl2">WhatsApp</div><div class="val2">'+l.telefono+'</div></div>';
  if(l.canon) h+='<div><div class="lbl2">Canon</div><div class="val2">'+fCOP(l.canon)+'</div></div>';
  if(l.diaPago) h+='<div><div class="lbl2">Día de pago</div><div class="val2">Día '+l.diaPago+'</div></div>';
  if(l.finContrato) h+='<div><div class="lbl2">Fin contrato</div><div class="val2">'+fFecha(l.finContrato)+'</div></div>';
  if(l.obs) h+='<div style="grid-column:1/-1"><div class="lbl2">NICs / Notas</div><div class="val2">'+l.obs+'</div></div>';
  h+='</div>';
  h+='<div class="dbtns">';
  if(l.arrendatario) h+='<button class="dbtn pago" id="db-pago">💵 Pago</button>';
  if(l.arrendatario&&l.telefono) h+='<button class="dbtn wa" id="db-wa">💬 WhatsApp</button>';
  h+='<button class="dbtn edit" id="db-edit">✏️ Editar</button>';
  h+='<button class="dbtn del" id="db-del">🗑️</button>';
  h+='</div>';
  h+='<div class="sec" style="margin-top:16px">Historial de pagos</div>';
  if(pagosL.length===0){h+='<div style="color:#7a7f9a;font-size:.85rem">Sin pagos</div>';}
  pagosL.forEach(function(p){
    h+='<div class="pitem"><div><div style="font-weight:500">'+fMes(p.mes)+'</div><div style="font-size:.7rem;color:#7a7f9a">'+fFecha(p.fecha)+(p.nota?' · '+p.nota:'')+'</div></div><div style="display:flex;align-items:center;gap:6px"><span class="pmonto">'+fCOP(p.monto)+'</span><button class="pdel" data-pid="'+p.id+'" data-lid="'+id+'">×</button></div></div>';
  });
  document.getElementById('mDetalleContent').innerHTML=h;
  document.getElementById('mDetalle').className='overlay open';

  var dbp=document.getElementById('db-pago');
  if(dbp) dbp.onclick=function(){abrirPago(id);};
  var dbw=document.getElementById('db-wa');
  if(dbw) dbw.onclick=function(){enviarWA(id);};
  var dbe=document.getElementById('db-edit');
  if(dbe) dbe.onclick=function(){editarLocal(id);};
  var dbd=document.getElementById('db-del');
  if(dbd) dbd.onclick=function(){
    confirm2('¿Eliminar este local?','Eliminar',function(ok){
      if(!ok) return;
      var d2=getData();
      d2.locales=d2.locales.filter(function(x){return x.id!==id;});
      d2.pagos=d2.pagos.filter(function(x){return x.localId!==id;});
      saveData(d2);
      document.getElementById('mDetalle').className='overlay';
      render();
    });
  };
  document.querySelectorAll('.pdel').forEach(function(btn){
    btn.onclick=function(){
      var pid=this.getAttribute('data-pid'), lid=this.getAttribute('data-lid');
      confirm2('¿Eliminar este pago?','Eliminar',function(ok){
        if(!ok) return;
        var d2=getData();
        d2.pagos=d2.pagos.filter(function(x){return x.id!==pid;});
        saveData(d2);
        abrirDetalle(lid);
        render();
      });
    };
  });
}

  var d=getData(), eid=document.getElementById('fId').value;
  var loc={id:eid||uid(),nombre:nom,arrendatario:document.getElementById('fArr').value.trim(),telefono:document.getElementById('fTel').value.trim(),cedula:document.getElementById('fCed').value.trim(),canon:document.getElementById('fCan').value,diaPago:document.getElementById('fDia').value,inicioContrato:document.getElementById('fIni').value,finContrato:document.getElementById('fFin').value,obs:document.getElementById('fObs').value.trim()};
  if(eid){var i=d.locales.findIndex(function(x){return x.id===eid;});if(i!==-1)d.locales[i]=loc;}

// PAGOS
function abrirPago(id){
  var hoy=new Date(), d=getData(), l=d.locales.find(function(x){return x.id===id;});
  document.getElementById('pLocalId').value=id;
  document.getElementById('pMes').value=mesHoy();
  document.getElementById('pFecha').value=hoy.toISOString().split('T')[0];
  document.getElementById('pMonto').value=l?l.canon:'';
  document.getElementById('pNota').value='';
  document.getElementById('pComp').value='';
  MEDIO='';
  document.getElementById('btnEf').className='mbtn';
  document.getElementById('btnTr').className='mbtn';
  document.getElementById('grpComp').style.display='none';
  document.getElementById('mDetalle').className='overlay';
  document.getElementById('mPago').className='overlay open';
}
document.getElementById('btnEf').onclick=function(){MEDIO='efectivo';this.className='mbtn ef';document.getElementById('btnTr').className='mbtn';document.getElementById('grpComp').style.display='none';};
document.getElementById('btnTr').onclick=function(){MEDIO='transferencia';this.className='mbtn tr';document.getElementById('btnEf').className='mbtn';document.getElementById('grpComp').style.display='';};
document.getElementById('btnGuardarPago').onclick=function(){
  var mes=document.getElementById('pMes').value, monto=document.getElementById('pMonto').value;
  if(!mes||!monto){toast('⚠️ Completa mes y monto');return;}
  if(!MEDIO){toast('⚠️ Selecciona medio de pago');return;}
  var d=getData(), lid=document.getElementById('pLocalId').value;
  d.pagos.push({id:uid(),localId:lid,mes:mes,monto:Number(monto),medio:MEDIO,comprobante:document.getElementById('pComp').value.trim(),fecha:document.getElementById('pFecha').value,nota:document.getElementById('pNota').value.trim()});
  saveData(d);
  document.getElementById('mPago').className='overlay';
  abrirDetalle(lid);
  render();
};
document.getElementById('btnCancelarPago').onclick=function(){document.getElementById('mPago').className='overlay';};
document.getElementById('mPago').onclick=function(e){if(e.target===this)this.className='overlay';};

// WHATSAPP
function enviarWA(id){
  var d=getData(), l=d.locales.find(function(x){return x.id===id;});
  if(!l||!l.telefono){toast('⚠️ Sin número de WhatsApp');return;}
  var meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var hoy=new Date(), mes=meses[hoy.getMonth()], anio=hoy.getFullYear();
  var msg='Hola '+l.arrendatario+' 👋\n\nLe recuerdo que el arriendo del '+l.nombre+' del mes de '+mes+' '+anio+' está pendiente.\n\n💰 Valor: '+fCOP(l.canon)+'\n📅 Día límite: '+l.diaPago+' de '+mes+'\n\n🏦 Bancolombia Ahorros: 687-761838-34\n👤 Jems Hoyos\n\nGracias! 🙏\n_Jems Hoyos_ · 📱 310 703 6496';
  window.open('https://wa.me/57'+l.telefono.replace(/\D/g,'')+'?text='+encodeURIComponent(msg),'_blank');
}
function cobrarTodos(){
  var d=getData(), mc=mesHoy();
  var pagados={};
  d.pagos.forEach(function(p){if(p.mes===mc)pagados[p.localId]=true;});
  var pend=d.locales.filter(function(l){return l.arrendatario&&!pagados[l.id]&&l.telefono;});
  if(pend.length===0){toast('⚠️ No hay pendientes con WhatsApp');return;}
  var i=0;
  function enviarSig(){if(i<pend.length){enviarWA(pend[i].id);i++;setTimeout(enviarSig,1500);}}
  enviarSig();
}

};
document.getElementById('btnCargar').onclick=function(){
  toast('🔄 Cargando...');
  fetch(SCRIPT_URL+'?t='+Date.now())
  .then(function(r){return r.json();})
  .then(function(data){
    if(data.locales&&data.locales.length>0){
      data.pagos=data.pagos||[];
      data.deudas=data.deudas||[];
      saveData(data);render();
      toast('✅ Datos actualizados');
    } else {toast('⚠️ No hay datos en la nube');}
  })
  .catch(function(){toast('⚠️ Error de conexión');});
};
