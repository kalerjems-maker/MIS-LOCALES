<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Locales</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;
    --accent:#f5a623;--text:#eef0f8;--muted:#7a7f9a;
    --danger:#ff4f6d;--success:#3ddc97;--warning:#ffb347;
    --border:rgba(255,255,255,0.07);--radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  header{background:linear-gradient(135deg,#1a1d27 0%,#12151f 100%);border-bottom:1px solid var(--border);padding:18px 20px 14px;position:sticky;top:0;z-index:100;}
  .header-inner{display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:var(--accent);}
  .logo span{color:var(--text);}
  .btn-add{background:var(--accent);color:#111;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;padding:9px 16px;border-radius:50px;cursor:pointer;transition:transform .15s,box-shadow .15s;}
  .btn-add:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,166,35,.35);}
  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;}
  .tab{font-family:'Syne',sans-serif;font-weight:600;font-size:.78rem;padding:14px 16px;color:var(--muted);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .main{padding:18px 16px 80px;max-width:600px;margin:0 auto;}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .s-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;}
  .s-card .label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
  .s-card .value{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;}
  .s-card .value.green{color:var(--success);}.s-card .value.red{color:var(--danger);}.s-card .value.yellow{color:var(--accent);}
  .btn-cobrar-todos{width:100%;background:#25D366;color:#111;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;padding:13px;border-radius:12px;cursor:pointer;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s,box-shadow .15s;}
  .btn-cobrar-todos:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,211,102,.35);}
  .section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
  .local-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;overflow:hidden;}
  .local-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
  .local-card.al-dia::before{background:var(--success);}.local-card.vence-pronto::before{background:var(--warning);}.local-card.vencido::before{background:var(--danger);}.local-card.sin-arrendatario::before{background:var(--muted);}
  .local-card:hover{border-color:rgba(245,166,35,.3);transform:translateY(-1px);}
  .local-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .local-nombre{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;}
  .local-num{font-size:.72rem;color:var(--muted);margin-top:2px;}
  .badge{font-size:.65rem;font-weight:600;padding:4px 10px;border-radius:50px;letter-spacing:.4px;white-space:nowrap;}
  .badge.pagado{background:rgba(61,220,151,.15);color:var(--success);}
  .badge.pendiente{background:rgba(255,79,109,.15);color:var(--danger);}
  .badge.vence{background:rgba(255,179,71,.15);color:var(--warning);}
  .badge.libre{background:rgba(122,127,154,.15);color:var(--muted);}
  .badge.hoy{background:rgba(245,166,35,.2);color:var(--accent);}
  .local-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .info-item .lbl{font-size:.67rem;color:var(--muted);}.info-item .val{font-size:.85rem;font-weight:500;}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center;}
  .overlay.active{display:flex;}
  .modal{background:var(--surface);width:100%;max-width:600px;border-radius:24px 24px 0 0;padding:24px 20px 36px;max-height:90vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.25,.46,.45,.94);}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
  .modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;margin-bottom:20px;}
  .form-group{margin-bottom:14px;}
  .form-group label{font-size:.73rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:6px;}
  .form-group input,.form-group select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
  .form-group input:focus,.form-group select:focus{border-color:var(--accent);}
  .form-group select option{background:var(--surface2);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .medio-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  .medio-btn{padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'Syne',sans-serif;font-weight:600;font-size:.82rem;cursor:pointer;text-align:center;transition:all .2s;}
  .medio-btn.active-efectivo{background:rgba(245,166,35,.15);border-color:var(--accent);color:var(--accent);}
  .medio-btn.active-transferencia{background:rgba(61,220,151,.15);border-color:var(--success);color:var(--success);}
  .btn-primary{width:100%;background:var(--accent);color:#111;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;padding:14px;border-radius:12px;cursor:pointer;margin-top:8px;transition:transform .15s,box-shadow .15s;}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(245,166,35,.3);}
  .btn-secondary{width:100%;background:transparent;color:var(--muted);border:1px solid var(--border);font-family:'Syne',sans-serif;font-weight:600;font-size:.9rem;padding:13px;border-radius:12px;cursor:pointer;margin-top:8px;}
  .detalle-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
  .btn-sm{flex:1;padding:10px;border-radius:10px;font-family:'Syne',sans-serif;font-weight:600;font-size:.76rem;border:none;cursor:pointer;transition:opacity .2s;white-space:nowrap;}
  .btn-sm:hover{opacity:.85;}
  .btn-pago{background:var(--success);color:#111;}.btn-wa{background:#25D366;color:#111;}.btn-edit{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-del{background:rgba(255,79,109,.15);color:var(--danger);}
  .pagos-list{margin-top:16px;}
  .pago-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
  .pago-item:last-child{border-bottom:none;}
  .pago-mes{font-weight:500;font-size:.88rem;}.pago-fecha{font-size:.7rem;color:var(--muted);}
  .pago-monto{font-family:'Syne',sans-serif;font-weight:700;color:var(--success);font-size:.9rem;}
  .del-pago{background:none;border:none;color:var(--danger);font-size:1rem;cursor:pointer;padding:4px 8px;}
  .tag-medio{font-size:.62rem;font-weight:600;padding:2px 7px;border-radius:50px;margin-left:5px;}
  .tag-efectivo{background:rgba(245,166,35,.15);color:var(--accent);}
  .tag-transferencia{background:rgba(61,220,151,.15);color:var(--success);}
  .incremento-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
  .incremento-box .ib-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;margin-bottom:10px;}
  .incremento-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .incremento-row:last-child{margin-bottom:0;}
  .incremento-row .ir-label{font-size:.75rem;color:var(--muted);}
  .incremento-row .ir-val{font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;}
  .btn-aplicar{background:var(--accent);color:#111;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;padding:8px 14px;border-radius:8px;cursor:pointer;}
  .meses-badge{display:inline-block;background:rgba(245,166,35,.12);color:var(--accent);font-size:.7rem;font-weight:600;padding:3px 9px;border-radius:50px;margin-left:6px;}
  .empty{text-align:center;padding:48px 20px;color:var(--muted);}
  .empty .icon{font-size:2.5rem;margin-bottom:12px;}.empty p{font-size:.9rem;line-height:1.5;}
  .alertas-list{display:flex;flex-direction:column;gap:10px;}
  .alerta-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;gap:14px;align-items:center;}
  .alerta-icon{font-size:1.5rem;}.alerta-texto .titulo{font-weight:600;font-size:.88rem;}.alerta-texto .sub{font-size:.75rem;color:var(--muted);margin-top:3px;}
  .cobro-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
  .cobro-row:last-of-type{border-bottom:none;}
  .deuda-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;overflow:hidden;}
  .deuda-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
  .deuda-card.deuda-propia::before{background:var(--danger);}
  .deuda-card.me-deben::before{background:var(--success);}
  .deuda-card.recordatorio::before{background:var(--accent);}
  .deuda-card:hover{border-color:rgba(245,166,35,.3);transform:translateY(-1px);}
  .fin-bar-wrap{background:var(--surface2);border-radius:50px;height:6px;margin-top:10px;overflow:hidden;}
  .fin-bar{height:6px;border-radius:50px;background:linear-gradient(90deg,var(--danger),var(--warning));}
  .analisis-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:20px;}
  .an-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;}
  .an-card .label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
  .an-card .value{font-family:'Syne',sans-serif;font-weight:800;font-size:0.75rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">Mis<span>Locales</span></div>
    <div style="display:flex;gap:8px;align-items:center">
    <button onclick="cargarDesdeSheets()" style="background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--muted);border-radius:50px;padding:8px 12px;font-size:.75rem;cursor:pointer;">☁️</button>
    <button onclick="sincronizarConSheets()" style="background:transparent;border:1px solid rgba(61,220,151,.3);color:var(--success);border-radius:50px;padding:8px 12px;font-size:.75rem;cursor:pointer;">💾</button>
    <button class="btn-add" onclick="abrirModalNuevoLocal()">+ Nuevo Local</button>
  </div>
  </div>
</header>
<div class="tabs">
  <button class="tab active" onclick="cambiarTab('resumen',this)">📊 Resumen</button>
  <button class="tab" onclick="cambiarTab('locales',this)">🏪 Locales</button>
  <button class="tab" onclick="cambiarTab('deudas',this)">💸 Deudas</button>
  <button class="tab" onclick="cambiarTab('alertas',this)">🔔 Alertas</button>
</div>
<div class="main">
  <div id="tab-resumen"></div>
  <div id="tab-locales" style="display:none"></div>
  <div id="tab-deudas" style="display:none"></div>
  <div id="tab-alertas" style="display:none"></div>
</div>

<!-- MODAL NUEVO/EDITAR LOCAL -->
<div class="overlay" id="modalLocal" onclick="cerrarSiOverlay(event,'modalLocal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalLocalTitulo">Nuevo Local</div>
    <div class="form-group"><label>Nombre del Local</label><input type="text" id="f_nombre" placeholder="Ej: Local 1"></div>
    <div class="form-group"><label>Arrendatario</label><input type="text" id="f_arrendatario" placeholder="Nombre completo"></div>
    <div class="form-row">
      <div class="form-group"><label>Teléfono WhatsApp</label><input type="tel" id="f_tel" placeholder="3XX XXX XXXX"></div>
      <div class="form-group"><label>Cédula</label><input type="text" id="f_cedula" placeholder="N° documento"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Canon mensual ($)</label><input type="number" id="f_canon" placeholder="0"></div>
      <div class="form-group"><label>Día de pago</label><input type="number" id="f_diapago" placeholder="Ej: 15" min="1" max="31"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Inicio contrato</label><input type="date" id="f_inicio"></div>
      <div class="form-group"><label>Fin contrato</label><input type="date" id="f_fin"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Incremento anual (%)</label><input type="number" id="f_incremento" placeholder="Ej: 10" min="0" max="100"></div>
      <div class="form-group"><label>Mes de incremento</label>
        <select id="f_mes_incremento">
          <option value="">-- Seleccione --</option>
          <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
          <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
          <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
          <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
        </select>
      </div>
    </div>
    <div class="form-group"><label>NICs / Observaciones</label><input type="text" id="f_obs" placeholder="NIC: XXXXXXX"></div>
    <input type="hidden" id="f_editId">
    <button class="btn-primary" onclick="guardarLocal()">Guardar</button>
    <button class="btn-secondary" onclick="cerrarModal('modalLocal')">Cancelar</button>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="overlay" id="modalDetalle" onclick="cerrarSiOverlay(event,'modalDetalle')">
  <div class="modal" id="modalDetalleContent"></div>
</div>

<!-- MODAL PAGO -->
<div class="overlay" id="modalPago" onclick="cerrarSiOverlay(event,'modalPago')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Registrar Pago</div>
    <div class="form-group"><label>Mes pagado</label><input type="month" id="p_mes"></div>
    <div class="form-group"><label>Monto recibido ($)</label><input type="number" id="p_monto" placeholder="0"></div>
    <div class="form-group"><label>Medio de pago</label></div>
    <div class="medio-btns">
      <button class="medio-btn" id="btn_efectivo" onclick="selMedio('efectivo')">💵 Efectivo</button>
      <button class="medio-btn" id="btn_transferencia" onclick="selMedio('transferencia')">🏦 Transferencia</button>
    </div>
    <div class="form-group" id="grupo_comprobante" style="display:none"><label>N° Comprobante</label><input type="text" id="p_comprobante" placeholder="Ej: 123456789"></div>
    <div class="form-group"><label>Fecha de pago</label><input type="date" id="p_fecha"></div>
    <div class="form-group"><label>Nota (opcional)</label><input type="text" id="p_nota" placeholder="Observaciones..."></div>
    <input type="hidden" id="p_localId">
    <input type="hidden" id="p_medio" value="">
    <button class="btn-primary" onclick="guardarPago()">Registrar Pago</button>
    <button class="btn-secondary" onclick="cerrarModal('modalPago')">Cancelar</button>
  </div>
</div>

<!-- MODAL COBRAR TODOS -->
<div class="overlay" id="modalCobrar" onclick="cerrarSiOverlay(event,'modalCobrar')">
  <div class="modal" id="modalCobrarContent"></div>
</div>

<!-- MODAL NUEVA DEUDA -->
<div class="overlay" id="modalDeuda" onclick="cerrarSiOverlay(event,'modalDeuda')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalDeudaTitulo">Nueva Deuda</div>
    <div class="form-group"><label>Tipo</label>
      <select id="d_tipo">
        <option value="propia">💸 Debo yo</option>
        <option value="me-deben">💰 Me deben</option>
        <option value="recordatorio">🔔 Recordatorio de cobro</option>
      </select>
    </div>
    <div class="form-group"><label>Nombre (banco o persona)</label><input type="text" id="d_nombre" placeholder="Ej: Bancolombia"></div>
    <div class="form-row">
      <div class="form-group"><label>Deuda total ($)</label><input type="number" id="d_total" placeholder="0"></div>
      <div class="form-group"><label>Cuota mensual ($)</label><input type="number" id="d_cuota" placeholder="0"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Interés mensual (%)</label><input type="number" id="d_interes" placeholder="Ej: 2.5" step="0.1"></div>
      <div class="form-group"><label>Día de pago</label><input type="number" id="d_dia" placeholder="Ej: 13" min="1" max="31"></div>
    </div>
    <div class="form-group"><label>Cuotas pagadas</label><input type="number" id="d_pagadas" placeholder="0" min="0"></div>
    <div class="form-group"><label>Total cuotas</label><input type="number" id="d_totalcuotas" placeholder="Ej: 24" min="0"></div>
    <div class="form-group"><label>Teléfono WhatsApp (opcional)</label><input type="tel" id="d_tel_deuda" placeholder="3XX XXX XXXX"></div>
    <div class="form-group"><label>Notas</label><input type="text" id="d_obs" placeholder="Observaciones..."></div>
    <input type="hidden" id="d_editId">
    <button class="btn-primary" onclick="guardarDeuda()">Guardar</button>
    <button class="btn-secondary" onclick="cerrarModal('modalDeuda')">Cancelar</button>
  </div>
</div>

<!-- MODAL DETALLE DEUDA -->
<div class="overlay" id="modalDeudaDetalle" onclick="cerrarSiOverlay(event,'modalDeudaDetalle')">
  <div class="modal" id="modalDeudaDetalleContent"></div>
</div>

<script>
const STORE_KEY='mis_locales_v1';
function cargarDatos(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||{locales:[],pagos:[]};}catch{return{locales:[],pagos:[]};}}
function guardarDatos(d){
  localStorage.setItem(STORE_KEY,JSON.stringify(d));
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function mesActual(){const h=new Date();return`${h.getFullYear()}-${String(h.getMonth()+1).padStart(2,'0')}`;}
function fmtCOP(n){if(!n)return'$0';return'$'+Number(n).toLocaleString('es-CO');}
function fmtCorto(n){
  if(!n) return '$0';
  const v=Number(n);
  if(v>=1000000) return '$'+( v/1000000).toFixed(1).replace('.0','')+'M';
  if(v>=1000) return '$'+(v/1000).toFixed(0)+'K';
  return '$'+v.toLocaleString('es-CO');
}
function formatFecha(f){if(!f)return'—';const[y,m,d]=f.split('-');return`${d}/${m}/${y}`;}
function formatMes(ym){if(!ym)return'—';const ms=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];const[y,m]=ym.split('-');return`${ms[parseInt(m)-1]} ${y}`;}

function mesesEnLocal(l){
  if(!l.inicioContrato) return null;
  const inicio=new Date(l.inicioContrato), hoy=new Date();
  const meses=(hoy.getFullYear()-inicio.getFullYear())*12+(hoy.getMonth()-inicio.getMonth());
  return Math.max(0,meses);
}

// TABS
let tabActual='resumen';
function cambiarTab(tab,el){
  tabActual=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['resumen','locales','deudas','alertas'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'':'none');
  renderAll();
}
function renderAll(){
  if(tabActual==='resumen') renderResumen();
  if(tabActual==='locales') renderLocales();
  if(tabActual==='deudas') renderDeudas();
  if(tabActual==='alertas') renderAlertas();
}

function estadoLocal(l,pagos){
  if(!l.arrendatario) return 'sin-arrendatario';
  if(pagos.some(p=>p.localId===l.id&&p.mes===mesActual())) return 'al-dia';
  if(l.finContrato){const diff=(new Date(l.finContrato)-new Date())/86400000;if(diff>=0&&diff<=30)return'vence-pronto';}
  return 'vencido';
}
function pagaHoy(l){return l.diaPago&&l.arrendatario&&new Date().getDate()===parseInt(l.diaPago);}

// INCREMENTO
function canonActual(l){
  if(!l.incrementoPct||!l.mesIncremento||!l.inicioContrato) return Number(l.canon)||0;
  const inicio=new Date(l.inicioContrato), hoy=new Date();
  let aniosTranscurridos=0;
  let checkDate=new Date(inicio.getFullYear(),parseInt(l.mesIncremento)-1,1);
  checkDate.setFullYear(inicio.getFullYear()+1);
  while(checkDate<=hoy){aniosTranscurridos++;checkDate.setFullYear(checkDate.getFullYear()+1);}
  const base=Number(l.canon)||0;
  return Math.round(base*Math.pow(1+(Number(l.incrementoPct)||0)/100,aniosTranscurridos));
}
function canonProximoAnio(l){
  const actual=canonActual(l);
  const pct=Number(l.incrementoPct)||0;
  return Math.round(actual*(1+pct/100));
}

// ALERTAS
function renderAlertas(){
  const d=cargarDatos(),hoy=new Date(),mc=mesActual();
  const alertas=[];
  const msNombres=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  d.locales.forEach(l=>{
    if(!l.arrendatario)return;
    if(pagaHoy(l)){
      const pagado=d.pagos.some(p=>p.localId===l.id&&p.mes===mc);
      alertas.push({icon:pagado?'✅':'🔔',titulo:${l.nombre} — Paga HOY (día ${l.diaPago}),sub:${l.arrendatario} · ${fmtCOP(canonActual(l))} · ${pagado?'Ya registrado':'Pendiente'},id:l.id});
    }
    const pagadoMes=d.pagos.some(p=>p.localId===l.id&&p.mes===mc);
    if(!pagadoMes&&!pagaHoy(l)) alertas.push({icon:'💸',titulo:${l.nombre} — Sin pago este mes,sub:${l.arrendatario} · ${fmtCOP(canonActual(l))} · Día ${l.diaPago||'?'},id:l.id});
    if(l.finContrato){
      const diff=Math.ceil((new Date(l.finContrato)-hoy)/86400000);
      if(diff>=0&&diff<=30) alertas.push({icon:'⚠️',titulo:${l.nombre} — Contrato vence en ${diff} días,sub:${l.arrendatario} · ${formatFecha(l.finContrato)},id:l.id});
      else if(diff<0) alertas.push({icon:'🔴',titulo:${l.nombre} — Contrato vencido,sub:${l.arrendatario} · Venció el ${formatFecha(l.finContrato)},id:l.id});
    }
    // Alerta incremento
    if(l.incrementoPct&&l.mesIncremento&&hoy.getMonth()+1===parseInt(l.mesIncremento)){
      const nuevo=canonProximoAnio(l);
      alertas.push({icon:'📈',titulo:${l.nombre} — Mes de incremento,sub:${l.arrendatario} · Canon sube a ${fmtCOP(nuevo)} (${l.incrementoPct}%),id:l.id});
    }
  });
  const el=document.getElementById('tab-alertas');
  if(alertas.length===0){el.innerHTML=<div class="empty"><div class="icon">✅</div><p>Sin alertas pendientes.</p></div>;return;}
  el.innerHTML=<div class="section-title">${alertas.length} alerta${alertas.length!==1?'s':''}</div><div class="alertas-list">${alertas.map(a=><div class="alerta-card" onclick="verDetalle('${a.id}')" style="cursor:pointer"><div class="alerta-icon">${a.icon}</div><div class="alerta-texto"><div class="titulo">${a.titulo}</div><div class="sub">${a.sub}</div></div></div>).join('')}</div>;
}

function abrirModalDeuda(){
  ['d_editId','d_nombre','d_total','d_cuota','d_interes','d_dia','d_pagadas','d_totalcuotas','d_obs','d_tel_deuda'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('d_tipo').value='propia';
  document.getElementById('modalDeudaTitulo').textContent='Nueva Deuda';
  document.getElementById('modalDeuda').classList.add('active');
}
function editarDeuda(id){
  const d=cargarDatosDeudas(),x=d.deudas.find(i=>i.id===id);
  if(!x)return;
  document.getElementById('d_editId').value=x.id;
  document.getElementById('d_tipo').value=x.tipo||'propia';
  document.getElementById('d_nombre').value=x.nombre||'';
  document.getElementById('d_total').value=x.total||'';
  document.getElementById('d_cuota').value=x.cuota||'';
  document.getElementById('d_interes').value=x.interes||'';
  document.getElementById('d_dia').value=x.dia||'';
  document.getElementById('d_pagadas').value=x.pagadas||'';
  document.getElementById('d_totalcuotas').value=x.totalCuotas||'';
  document.getElementById('d_obs').value=x.obs||'';
  document.getElementById('d_tel_deuda').value=x.telefono||'';
  document.getElementById('modalDeudaTitulo').textContent='Editar';
  cerrarModal('modalDeudaDetalle');
  document.getElementById('modalDeuda').classList.add('active');
}
function guardarDeuda(){
  const nombre=document.getElementById('d_nombre').value.trim();
  if(!nombre){alert('Escribe el nombre');return;}
  const d=cargarDatosDeudas();
  if(!d.deudas)d.deudas=[];
  const editId=document.getElementById('d_editId').value;
  const item={id:editId||uid(),tipo:document.getElementById('d_tipo').value,nombre,total:document.getElementById('d_total').value,cuota:document.getElementById('d_cuota').value,interes:document.getElementById('d_interes').value,dia:document.getElementById('d_dia').value,pagadas:document.getElementById('d_pagadas').value,totalCuotas:document.getElementById('d_totalcuotas').value,obs:document.getElementById('d_obs').value.trim(),telefono:document.getElementById('d_tel_deuda').value.trim()};
  if(editId){const i=d.deudas.findIndex(x=>x.id===editId);if(i!==-1)d.deudas[i]=item;}else d.deudas.push(item);
  guardarDatos(d);cerrarModal('modalDeuda');renderAll();
}
function verDetalleDeuda(id){
  const d=cargarDatosDeudas(),x=d.deudas.find(i=>i.id===id);
  if(!x)return;
  const pagadas=Number(x.pagadas)||0,totalC=Number(x.totalCuotas)||0;
  const faltan=totalC>0?totalC-pagadas:null;
  const pct=totalC>0?Math.min(100,Math.round(pagadas/totalC*100)):0;
  const interesTotal=x.interes&&x.total?Math.round(Number(x.total)*Number(x.interes)/100):0;
  document.getElementById('modalDeudaDetalleContent').innerHTML=`
    <div class="modal-handle"></div>
    <div class="modal-title">${x.nombre}</div>
    <div class="local-info" style="gap:12px;margin-bottom:16px">
      ${x.total?<div class="info-item"><div class="lbl">Deuda total</div><div class="val">${fmtCOP(x.total)}</div></div>:''}
      ${x.cuota?<div class="info-item"><div class="lbl">Cuota mensual</div><div class="val">${fmtCOP(x.cuota)}</div></div>:''}
      ${x.interes?<div class="info-item"><div class="lbl">Interés mensual</div><div class="val">${x.interes}%</div></div>:''}
      ${interesTotal?<div class="info-item"><div class="lbl">Interés en $</div><div class="val" style="color:var(--danger)">${fmtCOP(interesTotal)}/mes</div></div>:''}
      ${x.dia?<div class="info-item"><div class="lbl">Día de pago</div><div class="val">Día ${x.dia}</div></div>:''}
      ${faltan!==null?<div class="info-item"><div class="lbl">Cuotas pagadas</div><div class="val">${pagadas} de ${totalC}</div></div>:''}
      ${faltan!==null?<div class="info-item"><div class="lbl">Cuotas que faltan</div><div class="val" style="color:var(--danger)">${faltan}</div></div>:''}
      ${x.obs?<div class="info-item" style="grid-column:1/-1"><div class="lbl">Notas</div><div class="val">${x.obs}</div></div>:''}
    </div>
    ${totalC>0?`
      <div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:6px"><span>Progreso</span><span>${pct}% pagado</span></div>
        <div class="fin-bar-wrap"><div class="fin-bar" style="width:${pct}%"></div></div>
      </div>
    `:''}
    <div class="detalle-actions">
      <button class="btn-sm btn-pago" onclick="registrarCuota('${id}')">✅ Registrar cuota</button>
      ${!x.totalCuotas?<button class="btn-sm" style="background:rgba(245,166,35,.15);color:var(--accent);flex:1" onclick="registrarAbono('${id}')">💰 Abono capital</button>:''}
      ${x.telefono?<button class="btn-sm btn-wa" onclick="enviarWADeuda('${id}')">💬 WhatsApp</button>:''}
      <button class="btn-sm btn-edit" onclick="editarDeuda('${id}')">✏️ Editar</button>
      <button class="btn-sm btn-del" onclick="eliminarDeuda('${id}')">🗑️</button>
    </div>
    ${!x.totalCuotas&&x.interes?`
      <div style="margin-top:14px;background:var(--surface2);border-radius:12px;padding:14px">
        <div style="font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Simulación de abono</div>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="number" id="sim_abono_${id}" placeholder="Valor del abono" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:.85rem;outline:none">
          <button onclick="simularAbono('${id}')" style="background:var(--accent);color:#111;border:none;border-radius:8px;padding:8px 12px;font-family:'Syne',sans-serif;font-weight:700;font-size:.78rem;cursor:pointer">Ver</button>
        </div>
        <div id="sim_resultado_${id}" style="margin-top:8px;font-size:.78rem;color:var(--success)"></div>
      </div>
    `:''}
  `;
  document.getElementById('modalDeudaDetalle').classList.add('active');
}
function registrarCuota(id){
  const d=cargarDatosDeudas(),x=d.deudas.find(i=>i.id===id);
  if(!x)return;
  x.pagadas=(Number(x.pagadas)||0)+1;
  guardarDatos(d);cerrarModal('modalDeudaDetalle');verDetalleDeuda(id);renderAll();
}
function enviarWADeuda(id){
  const d=cargarDatosDeudas(),x=d.deudas.find(i=>i.id===id);
  if(!x||!x.telefono){alert('Sin número de WhatsApp');return;}
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const hoy=new Date(),mes=meses[hoy.getMonth()],anio=hoy.getFullYear();
  const msg=Hola ${x.nombre} 👋\n\nLe recuerdo que su parte del servicio *DirecTV* correspondiente al mes de *${mes} ${anio}* está pendiente.\n\n💰 *Valor: ${fmtCOP(x.cuota)}*\n📅 *Fecha límite: ${x.dia} de ${mes}*\n\n*Medios de pago:*\n🏦 Bancolombia Ahorros: 687-761838-34\n👤 A nombre de: Jems Hoyos\n\nPor favor me confirma cuando realice el pago.\n\n¡Gracias! 🙏\n_Jems Hoyos_\n📱 310 703 6496;
  window.open(https://wa.me/57${x.telefono.replace(/\D/g,'')}?text=${encodeURIComponent(msg)},'_blank');
}
function registrarAbono(id){
  const monto = prompt('¿Cuánto va a abonar al capital?');
  if(!monto || isNaN(monto)) return;
  const d = cargarDatosDeudas();
  const x = d.deudas.find(i=>i.id===id);
  if(!x) return;
  const abono = Number(monto);
  const nuevoTotal = Math.max(0, (Number(x.total)||0) - abono);
  const nuevoInteres = x.interes ? Math.round(nuevoTotal * Number(x.interes) / 100) : 0;
  x.total = nuevoTotal;
  if(nuevoInteres > 0) x.cuota = nuevoInteres;
  guardarDatos(d);
  cerrarModal('modalDeudaDetalle');
  verDetalleDeuda(id);
  renderAll();
  mostrarToast('✅ Abono registrado — Nueva deuda: $' + nuevoTotal.toLocaleString('es-CO'));
}

function simularAbono(id){
  const d = cargarDatosDeudas();
  const x = d.deudas.find(i=>i.id===id);
  if(!x) return;
  const abono = Number(document.getElementById('sim_abono_'+id).value);
  if(!abono || isNaN(abono)) return;
  const nuevoTotal = Math.max(0, (Number(x.total)||0) - abono);
  const nuevoInteres = x.interes ? Math.round(nuevoTotal * Number(x.interes) / 100) : 0;
  const ahorroMensual = (Number(x.cuota)||0) - nuevoInteres;
  document.getElementById('sim_resultado_'+id).innerHTML = 
    Nuevo capital: <strong>$${nuevoTotal.toLocaleString('es-CO')}</strong> · Nuevo interés: <strong>$${nuevoInteres.toLocaleString('es-CO')}/mes</strong> · Ahorro: <strong style="color:var(--success)">$${ahorroMensual.toLocaleString('es-CO')}/mes</strong>;
}

function eliminarDeuda(id){
  if(!confirm('¿Eliminar esta deuda?'))return;
  const d=cargarDatosDeudas();
  d.deudas=d.deudas.filter(x=>x.id!==id);
  guardarDatos(d);cerrarModal('modalDeudaDetalle');renderAll();
}

// GOOGLE SHEETS SYNC
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzFduuDipeYwuX687wGFE35Wi6hdBG0rbJzEYuXmfX5jQwNjpjPxMle-3_Qy3ODH2mh/exec';

async function sincronizarConSheets() {
  const d = cargarDatos();
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(d),
      headers: {'Content-Type': 'application/json'}
    });
    mostrarToast('✅ Datos guardados en la nube');
  } catch(e) {
    mostrarToast('⚠️ Sin conexión — datos guardados localmente');
  }
}

async function cargarDesdeSheets() {
  try {
    mostrarToast('🔄 Cargando datos...');
    const resp = await fetch(SCRIPT_URL + '?t=' + Date.now());
    const data = await resp.json();
    if(data.locales && data.locales.length > 0) {
      const local = cargarDatos();
      data.pagos = data.pagos || [];
      data.deudas = data.deudas || [];
      if(!local.deudas) data.deudas = [];
      guardarDatos(data);
      renderAll();
      mostrarToast('✅ Datos actualizados desde la nube');
    } else {
      mostrarToast('⚠️ No hay datos en la nube aún');
    }
  } catch(e) {
    mostrarToast('⚠️ Error al conectar con la nube');
  }
}

function mostrarToast(msg) {
  let t = document.getElementById('toast');
  if(!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1d27;color:#eef0f8;padding:10px 20px;border-radius:50px;font-size:.82rem;z-index:999;border:1px solid rgba(255,255,255,.1);white-space:nowrap;transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 3000);
}
